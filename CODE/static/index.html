<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudokuador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 class="logo">Sudokuador</h1>
            <p class="subtitle">Visión Artificial & Backtracking para resolver Sudokus</p>
        </header>

        <main class="main-content">
            <section class="upload-section" id="upload-section">
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="file-input" accept="image/jpeg, image/png, image/jpg" hidden>
                    <div class="upload-icon">📸</div>
                    <h3>Sube tu Sudoku</h3>
                    <p>Arrastra una foto aquí o haz clic para subir</p>
                    <button class="btn-primary" id="btn-browse">Seleccionar Imagen</button>
                </div>
            </section>

            <section class="processing-section hidden" id="processing-section">
                <div class="spinner"></div>
                <p id="processing-text">Analizando imagen con YOLO y CNN...</p>
            </section>

            <section class="results-section hidden" id="results-section">
                <div class="split-view">
                    <!-- Izquierda: Tablero Extraído por Visión -->
                    <div class="panel vision-panel">
                        <div class="panel-header">
                            <h2>Ojo de la IA</h2>
                            <button class="btn-icon" id="btn-debug" title="Modo Depuración">🔍</button>
                        </div>
                        <div class="board-container">
                            <img id="vision-image" src="" alt="Sudoku Extraído">
                            <div class="grid-overlay" id="grid-overlay"></div>
                        </div>
                        <div class="info-banner" id="vision-info"></div>
                    </div>

                    <!-- Derecha: Sudoku Interactivo -->
                    <div class="panel digital-panel">
                        <div class="panel-header">
                            <h2>Digitalizado</h2>
                        </div>
                        <div class="digital-board" id="digital-board">
                            <!-- 81 inputs will be generated here -->
                        </div>
                        <div class="actions">
                            <button class="btn-primary" id="btn-solve">Resolver Sudoku</button>
                            <button class="btn-secondary" id="btn-reset">Subir otra foto</button>
                        </div>
                        <div class="info-banner success hidden" id="solve-info">¡Sudoku resuelto!</div>
                    </div>
                </div>

                <!-- Modal de Depuración -->
                <div class="modal hidden" id="debug-modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Modo Depuración: Recortes CNN</h2>
                            <button class="close-btn" id="close-modal">&times;</button>
                        </div>
                        <div class="debug-grid" id="debug-grid">
                            <!-- 81 mini images will be generated here -->
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; margin-bottom: 0.75rem;">
                            <h3 style="color: var(--text-main); margin: 0;">Logs Matemáticos (Para depurar)</h3>
                            <button id="btn-copy-logs" class="btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">📋 Copiar Logs</button>
                        </div>
                        <textarea id="debug-logs" readonly></textarea>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
